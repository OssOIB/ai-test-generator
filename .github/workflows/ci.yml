name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-typecheck:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify CLI binary exists
        run: test -f dist/cli.js && echo "✓ CLI binary built"

  e2e-generate-and-run:
    name: E2E — Generate & Run Tests
    runs-on: ubuntu-latest
    needs: build-and-typecheck
    if: ${{ vars.ANTHROPIC_API_KEY != '' || secrets.ANTHROPIC_API_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install chromium --with-deps

      - name: Generate tests (no-run — validates AI generation only)
        run: node dist/cli.js https://www.saucedemo.com --no-run --output generated-tests/saucedemo.spec.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_MODEL: claude-sonnet-4-6

      - name: Verify test file was generated
        run: |
          test -f generated-tests/saucedemo.spec.ts && echo "✓ Test file generated"
          echo "--- Preview ---"
          head -30 generated-tests/saucedemo.spec.ts

      - name: Run generated tests
        run: npx playwright test generated-tests/saucedemo.spec.ts --config=playwright.runner.config.ts --reporter=list
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
